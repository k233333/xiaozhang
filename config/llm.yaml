# LLM Provider + 路由规则
# 加新 provider 只在这里加，代码 0 改动

providers:
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com/v1
    sdk: openai            # 走 OpenAI 兼容 SDK
    models:
      v4: deepseek-chat
      v4-pro: deepseek-reasoner

  # 未来加这些 provider 只解开注释 + 填 env：
