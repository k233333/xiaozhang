  #   models:
  #     pro: gemini-2.5-pro
  #     flash: gemini-2.5-flash

# 路由规则：每个任务有 primary + fallback，failover 自动切换
routing:
  intent_classification:
    primary: deepseek.v4
    timeout: 10

  simple_chat:
    primary: deepseek.v4
    timeout: 15

  task_planning:
    primary: deepseek.v4-pro
    fallback: deepseek.v4
    timeout: 30

  vision_analysis:
    primary: deepseek.v4-pro
    timeout: 30

  skill_generation:
    primary: deepseek.v4-pro
    fallback: deepseek.v4
    timeout: 30

policy:
  retry_max: 2
  retry_delay: 1.0
  on_all_fail_message: "模型暂时不可用，请稍后再试"
  cache_recent_planning: true
  cache_size: 20
